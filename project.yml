name: TempureAPP
options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    iOS: "17.0"
configs:
  Debug: debug
  Release: release
targets:
  TempureAPP:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/TempureAPP
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tempure.app
        PRODUCT_NAME: TempureAPP
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_CFBundleShortVersionString: "$(MARKETING_VERSION)"
        INFOPLIST_KEY_CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        SUPPORTS_MACCATALYST: NO
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - sdk: libsqlite3.tbd

  TempureAPPTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/TempureAPPTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tempure.app.tests
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleShortVersionString: "$(MARKETING_VERSION)"
        INFOPLIST_KEY_CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        SWIFT_VERSION: "6.0"
    dependencies:
      - target: TempureAPP

schemes:
  TempureAPP:
    build:
      targets:
        TempureAPP: all
        TempureAPPTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TempureAPPTests
